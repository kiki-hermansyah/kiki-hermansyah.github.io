<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        /* Desain Dasar */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* Latar Belakang Hitam */
            overflow: hidden; /* Mencegah scrollbar */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* Container Teks */
        .welcome-container {
            text-align: center;
        }

        /* Gaya Teks Welcome */
        .welcome-text {
            font-size: 5rem; /* Ukuran sangat besar */
            font-weight: 900;
            letter-spacing: -2px;
            color: #ffffff;
            opacity: 0; /* Mulai dengan tidak terlihat */
            
            /* Memanggil Animasi */
            animation: introReveal 2.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
            
            /* Efek Kilau Gradasi (Opsional, matikan jika ingin putih polos) */
            background: linear-gradient(135deg, #ffffff 0%, #a2a2a2 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: introReveal 2.5s cubic-bezier(0.77, 0, 0.175, 1) forwards,
                       shine 4s linear infinite;
        }

        /* Ukuran responsif untuk layar HP */
        @media (max-width: 600px) {
            .welcome-text {
                font-size: 3rem;
                letter-spacing: -1px;
            }
        }

        /* --- KEYFRAMES ANIMASI --- */

        /* Animasi 1: Muncul dari bawah + Transparansi */
        @keyframes introReveal {
            0% {
                transform: translateY(50px);
                opacity: 0;
                filter: blur(10px);
            }
            100% {
                transform: translateY(0);
                opacity: 1;
                filter: blur(0px);
            }
        }

        /* Animasi 2: Efek Kilau Berjalan */
        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

    </style>
</head>
<body>

    <div class="welcome-container">
        <h1 class="welcome-text">WELCOME</h1>
    </div>

</body>
</html>
